<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Smart Money">
<meta name="theme-color" content="#080b12">
<title>Smart Money · Polymarket Top 100</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: #080b12; height: 100%; }
body { font-family: 'DM Mono', 'Courier New', monospace; color: #c8d6e5; min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #080b12; }

tbody tr:hover td { background: rgba(74,222,128,0.025) !important; }
button:active { opacity: 0.7; }
input[type=number] { background: #0a1020; border: 1px solid #1a2235; color: #c8d6e5; padding: 6px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; width: 60px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.pulse { animation: pulse 1.5s ease-in-out infinite; }
</style>

<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

const STORAGE_KEY = "polymarket_dashboard_v1";
const loadStore = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; } };
const saveStore = (data) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {} };

const wakeProxy = async (onDot) => {
  const start = Date.now();
  while (Date.now() - start < 180000) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 12000);
      const res = await fetch(`/proxy?url=${encodeURIComponent("https://data-api.polymarket.com/v1/leaderboard?limit=1")}`, { signal: ctrl.signal });
      clearTimeout(t);
      if (res.ok) return true;
    } catch {}
    onDot();
    await new Promise(r => setTimeout(r, 4000));
  }
  throw new Error("Proxy did not wake up after 3 minutes.");
};

const pmFetch = async (url) => {
  const res = await fetch(`/proxy?url=${encodeURIComponent(url)}`);
  if (!res.ok) throw new Error(`Proxy ${res.status}`);
  return res.json();
};

// NEW: Fetch live market data from gamma API
const fetchMarketLive = async (slug, conditionId) => {
  try {
    if (slug) {
      const data = await pmFetch(`https://gamma-api.polymarket.com/markets?slug=${encodeURIComponent(slug)}`);
      if (Array.isArray(data) && data.length > 0) return data[0];
      if (data?.markets?.[0]) return data.markets[0];
    }
    if (conditionId) {
      const data = await pmFetch(`https://gamma-api.polymarket.com/markets?condition_ids=${conditionId}`);
      if (Array.isArray(data) && data.length > 0) return data[0];
    }
  } catch {}
  return null;
};

const aiCall = async (msg, maxTokens = 1500) => {
  const res = await fetch("/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTokens, messages: [{ role: "user", content: msg }] }),
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `AI ${res.status}`); }
  const d = await res.json();
  return d.content?.find(b => b.type === "text")?.text || "";
};

const sleep = (ms) => new Promise(r => setTimeout(r, ms));
const fmtC = (n) => n != null ? (Number(n) * 100).toFixed(0) + "¢" : "—";
const fmt = (n) => n != null ? Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }) : "—";

const fmtRel = (ts) => {
  if (!ts) return "never";
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
};

const fmtTime = (ts) => {
  if (!ts) return "—";
  return new Date(ts).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit", hour12: true });
};

const fmtToday = () => new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

const daysUntil = (dateStr) => dateStr ? Math.round((new Date(dateStr) - Date.now()) / 86400000) : null;

const hoursUntil = (dateStr) => {
  if (!dateStr) return null;
  return (new Date(dateStr) - Date.now()) / 3600000;
};

const NOISE_PATTERNS = [
  /will trump nominate .+ as the next fed chair/i,
  /will .+ win the 20\d\d-20\d\d nba mvp/i,
  /will .+ win the 20\d\d-20\d\d nba finals/i,
  /will .+ win the 20\d\d-?20?\d\d nhl stanley cup/i,
  /will .+ win the 20\d\d fifa world cup/i,
  /will .+ win the 20\d\d-20\d\d english premier league/i,
];

const isNoise = (m) => {
  if (!m.curPrice && (m.dominancePct === 100 || m.yesPct === 100 || m.yesPct === 0)) return true;
  if (NOISE_PATTERNS.some(p => p.test(m.title)) && m.dominancePct >= 95) return true;
  if (m.curPrice && m.curPrice >= 0.99) return true;
  // Hide markets resolving in less than 1 hour (stale)
  const hrs = hoursUntil(m.endDate);
  if (hrs != null && hrs < 1) return true;
  return false;
};

function App() {
  const [phase, setPhase] = useState("idle");
  const [prog, setProg] = useState(0);
  const [log, setLog] = useState("");
  const [dots, setDots] = useState("");
  const [result, setResult] = useState(null);
  const [previousScan, setPreviousScan] = useState(null);
  const [brief, setBrief] = useState("");
  const [tab, setTab] = useState("filtered");
  const [sel, setSel] = useState(null);
  const [err, setErr] = useState(null);
  const [filters, setFilters] = useState({ minPrice: 25, maxPrice: 75, minTraders: 5, maxDays: 30, freshOnly: false, hideNoise: true });
  const [filtersOpen, setFiltersOpen] = useState(false);
  const [askAI, setAskAI] = useState({ loading: false, advice: "", market: null, livePrice: null });
  const [bankroll, setBankroll] = useState(120);
  const [now, setNow] = useState(Date.now());

  // Update "now" every minute for live timestamps
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 60000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    const store = loadStore();
    if (store.lastResult) { setResult(store.lastResult); setBrief(store.lastBrief || ""); }
    if (store.previousScan) setPreviousScan(store.previousScan);
    if (store.bankroll) setBankroll(store.bankroll);
  }, []);

  useEffect(() => {
    const store = loadStore();
    saveStore({ ...store, bankroll });
  }, [bankroll]);

  const tick = (msg, pct) => { setLog(msg); if (pct != null) setProg(pct); };

  const run = useCallback(async () => {
    setPhase("running"); setErr(null); setBrief(""); setDots("");
    try {
      tick("Waking proxy server…", 2);
      let ds = "";
      await wakeProxy(() => { ds += "·"; setDots(ds); });
      setDots("");

      tick("Fetching leaderboard…", 8);
      const [p1, p2] = await Promise.all([
        pmFetch("https://data-api.polymarket.com/v1/leaderboard?window=all&limit=50&offset=0"),
        pmFetch("https://data-api.polymarket.com/v1/leaderboard?window=all&limit=50&offset=50"),
      ]);
      const arr1 = Array.isArray(p1) ? p1 : (p1.leaderboard || p1.data || []);
      const arr2 = Array.isArray(p2) ? p2 : (p2.leaderboard || p2.data || []);
      const traders = [...arr1, ...arr2];
      if (!traders.length) throw new Error("Leaderboard returned no traders.");

      tick(`${traders.length} traders loaded — fetching positions…`, 18);
      await sleep(150);

      const posMap = {};
      const top = traders.slice(0, 100);
      const BATCH = 8;

      for (let i = 0; i < top.length; i += BATCH) {
        const batch = top.slice(i, i + BATCH);
        const pct = 18 + Math.round(((i + BATCH) / top.length) * 58);
        tick(`Positions: ${i + 1}–${Math.min(i + BATCH, top.length)} of ${top.length}…`, Math.min(pct, 76));

        await Promise.allSettled(batch.map(async (trader, bi) => {
          const rank = i + bi + 1;
          const addr = trader.proxyWallet || trader.address || trader.wallet;
          if (!addr) return;
          let positions;
          try { positions = await pmFetch(`https://data-api.polymarket.com/positions?user=${addr}&sizeThreshold=0.05`); }
          catch { return; }
          if (!Array.isArray(positions)) return;

          const vol = Number(trader.vol) || 0;
          const pnl = Number(trader.pnl) || 0;
          const roi = vol > 0 ? pnl / vol : 0;
          const roiBoost = Math.min(3, Math.max(1, 1 + roi));
          const rankWeight = Math.pow((101 - rank) / 100, 0.7);
          const traderWeight = rankWeight * roiBoost;

          positions.forEach(pos => {
            if (!pos.title || !pos.size || pos.size <= 0) return;
            const key = pos.conditionId || pos.slug || pos.title;
            if (!posMap[key]) {
              posMap[key] = { title: pos.title, slug: pos.slug, eventSlug: pos.eventSlug, conditionId: pos.conditionId, curPrice: pos.curPrice, endDate: pos.endDate, yesT: 0, noT: 0, total: 0, yesS: 0, noS: 0, conv: 0, entrySum: 0, entryWeight: 0, details: [] };
            }
            const m = posMap[key];
            const isYes = pos.outcome?.toLowerCase() === "yes" || pos.outcomeIndex === 0;
            const entry = pos.avgPrice || pos.curPrice || 0.5;
            m.total++;
            m.conv += traderWeight * Math.sqrt(Math.abs(pos.size)) * (pos.curPrice || 0.5);
            m.entrySum += entry * pos.size;
            m.entryWeight += pos.size;
            if (isYes) { m.yesT++; m.yesS += pos.size; }
            else { m.noT++; m.noS += pos.size; }
            if (rank <= 30) {
              m.details.push({ rank, outcome: pos.outcome || (isYes ? "YES" : "NO"), size: Math.round(pos.size), entry: Math.round(entry * 100), roi: (roi * 100).toFixed(0), userName: trader.userName });
            }
          });
        }));
        await sleep(60);
      }

      tick("Aggregating…", 78);
      const prevMap = previousScan?.markets || {};

      const markets = Object.values(posMap)
        .filter(m => m.total >= 2)
        .sort((a, b) => b.conv - a.conv)
        .slice(0, 60)
        .map(m => {
          const tot = m.yesS + m.noS;
          const yesPct = tot > 0 ? Math.round((m.yesS / tot) * 100) : 50;
          const rec = yesPct >= 50 ? "YES" : "NO";
          const avgEntry = m.entryWeight > 0 ? m.entrySum / m.entryWeight : null;
          const key = m.conditionId || m.slug;
          const prev = prevMap[key];
          const tradersDelta = prev ? m.total - (prev.total || 0) : null;
          const isNew = !prev;
          const out = {
            ...m,
            totalTraders: m.total, yesPct, recommendation: rec,
            dominancePct: rec === "YES" ? yesPct : 100 - yesPct,
            conviction: Math.round(m.conv * 10) / 10,
            avgEntry, tradersDelta, isNew,
          };
          out.noise = isNoise(out);
          return out;
        });

      if (!markets.length) throw new Error("No overlapping positions found.");

      const newResult = { traders: top.length, markets, timestamp: Date.now() };
      setResult(newResult);

      const snapshot = { timestamp: Date.now(), markets: Object.fromEntries(markets.map(m => [m.conditionId || m.slug, { total: m.total, curPrice: m.curPrice }])) };
      saveStore({ lastResult: newResult, previousScan: snapshot, lastBrief: "", bankroll });
      setPreviousScan(snapshot);

      tick("Generating brief…", 86);
      const cleaned = markets.filter(m => !m.noise);
      const filtered = cleaned.filter(m => {
        const cents = (m.curPrice || 0) * 100;
        return cents >= 25 && cents <= 75 && m.totalTraders >= 5;
      }).slice(0, 10);

      const summary = (filtered.length ? filtered : cleaned.slice(0, 10)).map(m => ({
        title: m.title, traders: m.totalTraders, signal: m.recommendation,
        sentiment: m.dominancePct + "%",
        price: m.curPrice ? fmtC(m.curPrice) : "?",
        avgEntry: m.avgEntry ? fmtC(m.avgEntry) : "?",
        conviction: m.conviction,
        endDate: m.endDate?.split("T")[0] || "?",
        isNew: m.isNew, newTraders: m.tradersDelta,
      }));

      try {
        const today = fmtToday();
        const briefText = await aiCall(
`Today is ${today}. You are a sharp Polymarket investment analyst. Real top-100 trader data, noise-filtered. avgEntry = where smart money got in.

${JSON.stringify(summary, null, 2)}

User has $${bankroll} bankroll. Format EXACTLY:

TOP PICKS:
→ [Market] — [YES/NO] @ [price]. Entry: [avgEntry] (you'd be [late/early] by [delta]¢). [Why this is real edge in 1 sentence.] Suggested size: $[X]. Risk: [one risk].
→ [Second pick]
→ [Third pick]

FRESH:
[Markets where isNew=true or newTraders>0 — smart money actively building]

EDGE:
[1-2 sentences on overall pattern]`
        );
        setBrief(briefText);
        const store = loadStore();
        saveStore({ ...store, lastBrief: briefText });
      } catch (aiErr) {
        setBrief("AI brief unavailable: " + aiErr.message);
      }

      tick("Done.", 100);
      setPhase("done");
    } catch (e) {
      setErr(e.message); setPhase("error");
    }
  }, [previousScan, bankroll]);

  // Per-market AI advice — now fetches live price first
  const askAboutMarket = useCallback(async (m) => {
    setAskAI({ loading: true, advice: "", market: m, livePrice: null });
    try {
      // Step 1: Fetch live market data
      const liveData = await fetchMarketLive(m.slug, m.conditionId);
      let livePrice = m.curPrice;
      let liveYesPrice = null;
      let liveNoPrice = null;
      let outcomes = null;

      if (liveData) {
        // gamma API returns outcomePrices as array
        try {
          const op = typeof liveData.outcomePrices === "string" ? JSON.parse(liveData.outcomePrices) : liveData.outcomePrices;
          if (Array.isArray(op) && op.length >= 2) {
            liveYesPrice = parseFloat(op[0]);
            liveNoPrice = parseFloat(op[1]);
            // For our market signal direction, use the matching outcome
            livePrice = m.recommendation === "YES" ? liveYesPrice : liveNoPrice;
          }
          const oc = typeof liveData.outcomes === "string" ? JSON.parse(liveData.outcomes) : liveData.outcomes;
          if (Array.isArray(oc)) outcomes = oc;
        } catch {}
      }

      const ctx = {
        title: m.title,
        currentDate: fmtToday(),
        currentTimestamp: new Date().toISOString(),
        livePriceForSignal: livePrice ? fmtC(livePrice) : "unknown",
        liveYesPrice: liveYesPrice ? fmtC(liveYesPrice) : "unknown",
        liveNoPrice: liveNoPrice ? fmtC(liveNoPrice) : "unknown",
        outcomes,
        smartMoneySignal: m.recommendation,
        sentiment: m.dominancePct + "%",
        traders: m.totalTraders,
        avgEntry: m.avgEntry ? fmtC(m.avgEntry) : "unknown",
        priceVsEntry: m.avgEntry && livePrice ? Math.round((livePrice - m.avgEntry) * 100) + "¢" : "unknown",
        endDate: m.endDate || "unknown",
        daysToResolve: daysUntil(m.endDate),
        hoursToResolve: hoursUntil(m.endDate)?.toFixed(1),
        topTraders: m.details?.slice(0, 5),
        bankroll,
      };

      setAskAI(prev => ({ ...prev, livePrice }));

      const advice = await aiCall(
`Today is ${fmtToday()}. You are a sharp Polymarket trading advisor giving direct, actionable advice.

MARKET DATA (LIVE):
${JSON.stringify(ctx, null, 2)}

Note: livePriceForSignal is the current live price for the BUY side that smart money is on. liveYesPrice/liveNoPrice are the current YES/NO prices.

Give your recommendation in this EXACT format (plain text, no markdown):

VERDICT: [BET | SKIP | WATCH]

WHY:
[2-3 sentences on the actual edge or lack thereof. Be specific about asymmetry, smart money behavior, time-to-resolve, and any red flags. If the market resolves in <24 hours, factor in that variance dominates.]

IF BETTING:
Side: [YES or NO]
Entry price: [acceptable price range to enter]
Size: $[suggested amount based on $${bankroll} bankroll - usually 5-25% of bankroll for single position]
Expected payout: $[total payout if you win, including original]
Hold time: [time until resolution]

RISKS:
- [Specific risk 1]
- [Specific risk 2]

If livePriceForSignal is "unknown" or market resolves in <1 hour, recommend SKIP — no edge can be evaluated.
If livePriceForSignal > 90¢, SKIP — terrible asymmetry.
If only 2-3 traders agree, SKIP — that's noise, not signal.
Be honest. Don't manufacture edge.`,
        1000
      );
      setAskAI({ loading: false, advice, market: m, livePrice });
    } catch (e) {
      setAskAI({ loading: false, advice: "Failed to get advice: " + e.message, market: m, livePrice: null });
    }
  }, [bankroll]);

  const filteredMarkets = useMemo(() => {
    if (!result) return [];
    return result.markets.filter(m => {
      if (filters.hideNoise && m.noise) return false;
      const cents = (m.curPrice || 0) * 100;
      if (cents < filters.minPrice || cents > filters.maxPrice) return false;
      if (m.totalTraders < filters.minTraders) return false;
      const days = daysUntil(m.endDate);
      if (days != null && (days < 0 || days > filters.maxDays)) return false;
      if (filters.freshOnly && !m.isNew && !((m.tradersDelta || 0) > 0)) return false;
      return true;
    });
  }, [result, filters, now]);

  const allCleanMarkets = useMemo(() => {
    if (!result) return [];
    return filters.hideNoise ? result.markets.filter(m => !m.noise) : result.markets;
  }, [result, filters.hideNoise, now]);

  const running = phase === "running";
  const top = filteredMarkets[0] || allCleanMarkets[0];
  const scanAge = result?.timestamp ? (now - result.timestamp) / 60000 : null;
  const isStale = scanAge != null && scanAge > 30;

  const S = {
    root: { fontFamily: "'DM Mono','Courier New',monospace", background: "#080b12", color: "#c8d6e5", minHeight: "100vh" },
    hdr: { borderBottom: "1px solid #1a2235", padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#08111f", position: "sticky", top: 0, zIndex: 50 },
    logo: { fontSize: "11px", letterSpacing: "3px", color: "#4ade80", textTransform: "uppercase", fontWeight: "700" },
    sub: { color: "#2a3a50", marginLeft: "8px", fontSize: "9px" },
    btn: { background: running ? "#101c2c" : "linear-gradient(135deg,#4ade80,#22c55e)", color: running ? "#2a3a50" : "#060a0f", border: "none", borderRadius: "4px", padding: "8px 14px", fontSize: "10px", letterSpacing: "1.5px", textTransform: "uppercase", cursor: running ? "not-allowed" : "pointer", fontFamily: "'DM Mono',monospace", fontWeight: "700" },
    body: { padding: "16px", maxWidth: "1060px", margin: "0 auto" },
    progBox: { margin: "16px 0", background: "#0d1826", border: "1px solid #1a2235", borderRadius: "6px", padding: "16px" },
    bar: { height: "3px", background: "#1a2235", borderRadius: "2px", marginTop: "10px", overflow: "hidden" },
    statsRow: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "10px" },
    card: (a) => ({ background: "#0d1826", border: `1px solid ${a || "#1a2235"}`, borderRadius: "6px", padding: "12px" }),
    lbl: { fontSize: "9px", letterSpacing: "2px", color: "#2a3a50", textTransform: "uppercase" },
    val: { fontSize: "20px", color: "#c8d6e5", marginTop: "4px", fontWeight: "700" },
    tabRow: { display: "flex", borderBottom: "1px solid #1a2235", marginBottom: "12px", overflowX: "auto" },
    tab: (a) => ({ padding: "8px 14px", fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", cursor: "pointer", background: "none", border: "none", borderBottom: a ? "2px solid #4ade80" : "2px solid transparent", color: a ? "#4ade80" : "#2a3a50", fontFamily: "'DM Mono',monospace", whiteSpace: "nowrap" }),
    panel: { background: "#0d1826", border: "1px solid #1a2235", borderRadius: "6px", padding: "16px", lineHeight: "1.8", fontSize: "12px", color: "#9db8d4", whiteSpace: "pre-wrap" },
    th: { fontSize: "9px", letterSpacing: "2px", textTransform: "uppercase", color: "#2a3a50", textAlign: "left", padding: "8px 8px", borderBottom: "1px solid #1a2235", whiteSpace: "nowrap" },
    td: { padding: "9px 8px", fontSize: "11px", borderBottom: "1px solid #0f1e30", verticalAlign: "middle" },
    badge: (s) => ({ background: s === "YES" ? "rgba(74,222,128,0.1)" : "rgba(248,113,113,0.1)", color: s === "YES" ? "#4ade80" : "#f87171", border: `1px solid ${s === "YES" ? "#4ade80" : "#f87171"}`, borderRadius: "3px", padding: "2px 6px", fontSize: "9px", letterSpacing: "1px" }),
    newBadge: { background: "rgba(251,191,36,0.15)", color: "#fbbf24", border: "1px solid rgba(251,191,36,0.4)", borderRadius: "3px", padding: "1px 5px", fontSize: "8px", letterSpacing: "1px", marginLeft: "4px" },
    sBar: { display: "flex", height: "4px", borderRadius: "2px", overflow: "hidden", width: "60px", marginTop: "3px" },
    errBox: { background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.3)", borderRadius: "6px", padding: "16px", color: "#f87171", fontSize: "12px", lineHeight: "1.7" },
    overlay: { position: "fixed", inset: 0, background: "rgba(8,11,18,0.92)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: "16px" },
    modal: { background: "#0d1826", border: "1px solid #1a2235", borderRadius: "8px", padding: "20px", maxWidth: "560px", width: "100%", maxHeight: "85vh", overflowY: "auto" },
    askBtn: { width: "100%", background: "linear-gradient(135deg,#22d3ee,#0ea5e9)", color: "#060a0f", border: "none", borderRadius: "6px", padding: "12px", fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", cursor: "pointer", fontFamily: "'DM Mono',monospace", fontWeight: "700", marginBottom: "14px" },
    filterPanel: { background: "#0a1020", border: "1px solid #1a2235", borderRadius: "6px", padding: "14px", marginBottom: "12px" },
    filterRow: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "10px", gap: "10px" },
    dateBar: { background: "#08111f", borderBottom: "1px solid #1a2235", padding: "6px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: "9px", color: "#3b5270", letterSpacing: "1px" },
  };

  const Row = ({ m, i }) => (
    <tr onClick={() => setSel(m)} style={{ cursor: "pointer" }}>
      <td style={{ ...S.td, color: "#2a3a50", fontSize: "10px" }}>{i+1}</td>
      <td style={{ ...S.td, maxWidth: "180px" }}>
        <div style={{ fontSize: "11px", color: "#c8d6e5", lineHeight: "1.3" }}>
          {m.title}
          {m.isNew && <span style={S.newBadge}>NEW</span>}
          {m.tradersDelta > 0 && <span style={S.newBadge}>+{m.tradersDelta}</span>}
        </div>
      </td>
      <td style={S.td}><span style={S.badge(m.recommendation)}>{m.recommendation}</span></td>
      <td style={{ ...S.td, color: "#c8d6e5" }}>{m.curPrice ? fmtC(m.curPrice) : "—"}</td>
      <td style={{ ...S.td, color: "#9db8d4" }}>{m.totalTraders}</td>
      <td style={S.td}>
        <div style={{ fontSize: "10px", color: m.yesPct >= 50 ? "#4ade80" : "#f87171" }}>{m.yesPct}%</div>
        <div style={S.sBar}>
          <div style={{ width: m.yesPct+"%", background: "#4ade80" }}/>
          <div style={{ width: (100-m.yesPct)+"%", background: "#f87171" }}/>
        </div>
      </td>
      <td style={{ ...S.td, color: "#22d3ee", fontWeight: "700" }}>{m.conviction}</td>
    </tr>
  );

  return (
    <div style={S.root}>
      <div style={S.hdr}>
        <div><span style={S.logo}>⬡ SMART MONEY</span><span style={S.sub}>TOP 100 · LIVE</span></div>
        <button style={S.btn} disabled={running} onClick={run}>
          {running ? "● SCANNING" : phase === "done" || result ? "↺ REFRESH" : "▶ RUN SCAN"}
        </button>
      </div>

      {/* Date/timestamp bar */}
      <div style={S.dateBar}>
        <span>{fmtToday().toUpperCase()}</span>
        {result?.timestamp && (
          <span style={{ color: isStale ? "#f87171" : "#3b5270" }}>
            {isStale && "⚠ "}LAST SCAN · {fmtTime(result.timestamp)} · {fmtRel(result.timestamp)}
          </span>
        )}
      </div>

      <div style={S.body}>
        {phase === "idle" && !result && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: "#2a3a50" }}>
            <div style={{ fontSize: "52px", marginBottom: "14px", opacity: 0.2 }}>⬡</div>
            <div style={{ fontSize: "11px", letterSpacing: "3px", marginBottom: "8px" }}>POLYMARKET SMART MONEY SCANNER</div>
            <div style={{ fontSize: "10px", color: "#1a2a3a" }}>Live prices · Noise filtered · Per-market AI advice</div>
          </div>
        )}

        {running && (
          <div style={S.progBox}>
            <div style={{ fontSize: "11px", letterSpacing: "1px", color: "#4ade80" }}>{log} <span style={{ color: "#2a3a50" }}>{dots}</span></div>
            <div style={S.bar}><div style={{ height: "100%", background: "linear-gradient(90deg,#4ade80,#22d3ee)", width: prog + "%", transition: "width 0.5s ease", borderRadius: "2px" }} /></div>
            <div style={{ fontSize: "9px", color: "#2a3a50", marginTop: "5px", display: "flex", justifyContent: "space-between" }}>
              <span>{prog < 10 ? "Cold start: up to 3 min…" : ""}</span><span>{prog}%</span>
            </div>
          </div>
        )}

        {phase === "error" && (
          <div style={S.errBox}>
            <div style={{ fontWeight: "700", marginBottom: "6px" }}>⚠ SCAN FAILED</div>
            <div>{err}</div>
          </div>
        )}

        {result && (
          <>
            {isStale && (
              <div style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.3)", borderRadius: "6px", padding: "10px 14px", marginBottom: "12px", fontSize: "10px", color: "#f87171" }}>
                ⚠ Data is {Math.round(scanAge)} min old. Prices on Polymarket move constantly — hit REFRESH for current data.
              </div>
            )}

            <div style={S.statsRow}>
              <div style={S.card()}>
                <div style={S.lbl}>Filtered Picks</div>
                <div style={S.val}>{filteredMarkets.length}<span style={{ fontSize: "12px", color: "#2a3a50", marginLeft: "6px" }}>of {allCleanMarkets.length}</span></div>
              </div>
              <div style={S.card()}>
                <div style={S.lbl}>Bankroll</div>
                <div style={{ display: "flex", alignItems: "center", gap: "6px", marginTop: "6px" }}>
                  <span style={{ fontSize: "16px", color: "#4ade80", fontWeight: "700" }}>$</span>
                  <input type="number" value={bankroll} onChange={e => setBankroll(+e.target.value || 0)}
                    style={{ background: "#0a1020", border: "1px solid #1a2235", color: "#c8d6e5", padding: "4px 6px", borderRadius: "4px", fontFamily: "inherit", fontSize: "16px", width: "80px", fontWeight: "700" }}/>
                </div>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: "8px", marginBottom: "14px" }}>
              <div style={S.card(top?.recommendation === "YES" ? "rgba(74,222,128,0.25)" : top ? "rgba(248,113,113,0.25)" : "")}>
                <div style={S.lbl}>Top Filtered Pick</div>
                <div style={{ fontSize: "12px", color: top?.recommendation === "YES" ? "#4ade80" : "#f87171", marginTop: "6px", lineHeight: "1.4", fontWeight: "700" }}>
                  {top?.title?.slice(0, 56) || "—"}{top?.title?.length > 56 ? "…" : ""}
                  {top && <span style={{ fontSize: "10px", marginLeft: "6px", opacity: 0.7 }}>{top.recommendation} @ {top.curPrice ? fmtC(top.curPrice) : "?"}</span>}
                </div>
              </div>
            </div>

            <div style={S.filterPanel}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer" }} onClick={() => setFiltersOpen(!filtersOpen)}>
                <div style={{ fontSize: "10px", letterSpacing: "2px", color: "#4ade80", textTransform: "uppercase" }}>
                  ▾ Filters · {filters.minPrice}–{filters.maxPrice}¢ · {filters.minTraders}+ T · ≤{filters.maxDays}d{filters.hideNoise ? " · clean" : ""}
                </div>
                <div style={{ fontSize: "9px", color: "#2a3a50" }}>{filtersOpen ? "hide" : "edit"}</div>
              </div>
              {filtersOpen && (
                <div style={{ marginTop: "14px" }}>
                  <div style={S.filterRow}>
                    <div style={{ fontSize: "10px", color: "#9db8d4" }}>Price range</div>
                    <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                      <input type="number" min="0" max="100" value={filters.minPrice} onChange={e => setFilters({ ...filters, minPrice: +e.target.value })}/>
                      <span style={{ color: "#2a3a50", fontSize: "10px" }}>–</span>
                      <input type="number" min="0" max="100" value={filters.maxPrice} onChange={e => setFilters({ ...filters, maxPrice: +e.target.value })}/>
                      <span style={{ color: "#2a3a50", fontSize: "10px" }}>¢</span>
                    </div>
                  </div>
                  <div style={S.filterRow}>
                    <div style={{ fontSize: "10px", color: "#9db8d4" }}>Min traders</div>
                    <input type="number" min="1" max="50" value={filters.minTraders} onChange={e => setFilters({ ...filters, minTraders: +e.target.value })}/>
                  </div>
                  <div style={S.filterRow}>
                    <div style={{ fontSize: "10px", color: "#9db8d4" }}>Max days to resolve</div>
                    <input type="number" min="1" max="365" value={filters.maxDays} onChange={e => setFilters({ ...filters, maxDays: +e.target.value })}/>
                  </div>
                  <div style={S.filterRow}>
                    <div style={{ fontSize: "10px", color: "#9db8d4" }}>Hide noise</div>
                    <button onClick={() => setFilters({ ...filters, hideNoise: !filters.hideNoise })}
                      style={{ background: filters.hideNoise ? "#4ade80" : "#101c2c", color: filters.hideNoise ? "#060a0f" : "#9db8d4", border: "none", borderRadius: "4px", padding: "5px 12px", fontSize: "9px", letterSpacing: "1px", fontFamily: "inherit", cursor: "pointer" }}>
                      {filters.hideNoise ? "ON" : "OFF"}
                    </button>
                  </div>
                  <div style={S.filterRow}>
                    <div style={{ fontSize: "10px", color: "#9db8d4" }}>Fresh signals only</div>
                    <button onClick={() => setFilters({ ...filters, freshOnly: !filters.freshOnly })}
                      style={{ background: filters.freshOnly ? "#4ade80" : "#101c2c", color: filters.freshOnly ? "#060a0f" : "#9db8d4", border: "none", borderRadius: "4px", padding: "5px 12px", fontSize: "9px", letterSpacing: "1px", fontFamily: "inherit", cursor: "pointer" }}>
                      {filters.freshOnly ? "ON" : "OFF"}
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: "6px", marginTop: "10px" }}>
                    <button onClick={() => setFilters({ minPrice: 25, maxPrice: 75, minTraders: 5, maxDays: 30, freshOnly: false, hideNoise: true })}
                      style={{ background: "#101c2c", color: "#9db8d4", border: "none", borderRadius: "4px", padding: "6px 10px", fontSize: "9px", letterSpacing: "1px", fontFamily: "inherit", cursor: "pointer" }}>Reset</button>
                    <button onClick={() => setFilters({ minPrice: 0, maxPrice: 100, minTraders: 1, maxDays: 365, freshOnly: false, hideNoise: false })}
                      style={{ background: "#101c2c", color: "#9db8d4", border: "none", borderRadius: "4px", padding: "6px 10px", fontSize: "9px", letterSpacing: "1px", fontFamily: "inherit", cursor: "pointer" }}>Show all</button>
                  </div>
                </div>
              )}
            </div>

            <div style={S.tabRow}>
              {[["filtered","Filtered"],["brief","AI Brief"],["all","All Markets"]].map(([id,lbl]) => (
                <button key={id} style={S.tab(tab===id)} onClick={() => setTab(id)}>{lbl}</button>
              ))}
            </div>

            {tab === "brief" && <div style={S.panel}>{brief || "Run a scan to generate brief."}</div>}

            {tab === "filtered" && (
              <div style={{ overflowX: "auto", margin: "0 -16px", padding: "0 16px" }}>
                {filteredMarkets.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px 20px", color: "#2a3a50", fontSize: "11px" }}>
                    No markets match your filters.<br/>Loosen criteria above or hit "Show all".
                  </div>
                ) : (
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead><tr>{["#","Market","Sig","Price","T","Y%","Conv"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
                    <tbody>{filteredMarkets.map((m,i) => <Row key={m.conditionId||i} m={m} i={i}/>)}</tbody>
                  </table>
                )}
              </div>
            )}

            {tab === "all" && (
              <div style={{ overflowX: "auto", margin: "0 -16px", padding: "0 16px" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead><tr>{["#","Market","Sig","Price","T","Y%","Conv"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
                  <tbody>{allCleanMarkets.map((m,i) => <Row key={m.conditionId||i} m={m} i={i}/>)}</tbody>
                </table>
              </div>
            )}
          </>
        )}
      </div>

      {sel && (
        <div style={S.overlay} onClick={() => { setSel(null); setAskAI({ loading: false, advice: "", market: null, livePrice: null }); }}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "14px" }}>
              <span style={{ fontSize: "9px", letterSpacing: "2px", color: "#2a3a50", textTransform: "uppercase" }}>Market Detail · {fmtTime(Date.now())}</span>
              <button style={{ background: "none", border: "none", color: "#2a3a50", cursor: "pointer", fontSize: "16px" }} onClick={() => { setSel(null); setAskAI({ loading: false, advice: "", market: null, livePrice: null }); }}>✕</button>
            </div>
            <div style={{ fontSize: "14px", color: "#c8d6e5", lineHeight: "1.5", marginBottom: "16px" }}>
              {sel.title}
              {sel.isNew && <span style={S.newBadge}>NEW</span>}
              {sel.tradersDelta > 0 && <span style={S.newBadge}>+{sel.tradersDelta} TRADERS</span>}
            </div>

            <button style={S.askBtn} onClick={() => askAboutMarket(sel)} disabled={askAI.loading && askAI.market?.conditionId === sel.conditionId}>
              {askAI.loading && askAI.market?.conditionId === sel.conditionId ? <span className="pulse">◇ FETCHING LIVE PRICE & ANALYZING...</span> : "💡 ASK AI: SHOULD I BET?"}
            </button>

            {askAI.advice && askAI.market?.conditionId === sel.conditionId && (
              <div style={{ background: "#0a1020", border: "1px solid #22d3ee", borderRadius: "6px", padding: "14px", marginBottom: "14px", whiteSpace: "pre-wrap", fontSize: "11px", lineHeight: "1.7", color: "#c8d6e5" }}>
                {askAI.livePrice && (
                  <div style={{ fontSize: "9px", color: "#22d3ee", letterSpacing: "1px", marginBottom: "8px", paddingBottom: "8px", borderBottom: "1px solid #1a2235" }}>
                    LIVE PRICE: {fmtC(askAI.livePrice)} · FETCHED {fmtTime(Date.now())}
                  </div>
                )}
                {askAI.advice}
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px", marginBottom: "14px" }}>
              {[
                { l:"Signal", v:sel.recommendation, c:sel.recommendation==="YES"?"#4ade80":"#f87171" },
                { l:"Scan price", v:sel.curPrice?fmtC(sel.curPrice):"—" },
                { l:"Avg entry", v:sel.avgEntry?fmtC(sel.avgEntry):"—", c: "#fbbf24" },
                { l:"Traders", v:sel.totalTraders },
                { l:"YES", v:sel.yesT },
                { l:"NO", v:sel.noT },
              ].map(({l,v,c}) => (
                <div key={l} style={{ background: "#0a1020", borderRadius: "4px", padding: "10px" }}>
                  <div style={{ fontSize: "8px", color: "#2a3a50", letterSpacing: "1px", marginBottom: "3px" }}>{l}</div>
                  <div style={{ fontSize: "14px", color: c||"#c8d6e5", fontWeight: "700" }}>{v}</div>
                </div>
              ))}
            </div>

            {sel.avgEntry && sel.curPrice && (
              <div style={{ background: "#0a1020", borderRadius: "4px", padding: "10px", marginBottom: "14px" }}>
                <div style={{ fontSize: "8px", color: "#2a3a50", letterSpacing: "1px", marginBottom: "3px" }}>Scan price vs smart-money entry</div>
                <div style={{ fontSize: "12px", color: sel.curPrice > sel.avgEntry ? "#f87171" : "#4ade80", fontWeight: "700" }}>
                  {sel.curPrice > sel.avgEntry ? "↑" : "↓"} {Math.abs(Math.round((sel.curPrice - sel.avgEntry) * 100))}¢ {sel.curPrice > sel.avgEntry ? "ABOVE" : "BELOW"} entry
                  <span style={{ fontSize: "10px", color: "#2a3a50", marginLeft: "6px", fontWeight: "400" }}>
                    ({sel.curPrice > sel.avgEntry ? "you'd be late" : "you'd be early"})
                  </span>
                </div>
              </div>
            )}

            <div style={S.sBar}>
              <div style={{ width: sel.yesPct+"%", background: "#4ade80" }}/>
              <div style={{ width: (100-sel.yesPct)+"%", background: "#f87171" }}/>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: "9px", color: "#2a3a50", marginTop: "4px", marginBottom: "14px" }}>
              <span>YES {sel.yesPct}%</span><span>NO {100-sel.yesPct}%</span>
            </div>

            {sel.details?.length > 0 && (
              <>
                <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#2a3a50", textTransform: "uppercase", marginBottom: "8px" }}>Top Trader Positions</div>
                {sel.details.slice(0,8).map((t,i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #0f1e30", fontSize: "10px" }}>
                    <span style={{ color: "#2a3a50", minWidth: "40px" }}>#{t.rank}</span>
                    <span style={{ color: t.outcome?.toUpperCase()==="YES"?"#4ade80":"#f87171", minWidth: "30px" }}>{t.outcome?.toUpperCase()}</span>
                    <span style={{ color: "#c8d6e5", minWidth: "60px" }}>{fmt(t.size)}</span>
                    <span style={{ color: "#fbbf24" }}>@{t.entry}¢</span>
                    <span style={{ color: "#22d3ee" }}>{t.roi}% ROI</span>
                  </div>
                ))}
              </>
            )}
            {sel.endDate && (
              <div style={{ fontSize: "10px", color: "#2a3a50", marginTop: "12px" }}>
                Resolves: {sel.endDate.split("T")[0]} ({daysUntil(sel.endDate)}d, {hoursUntil(sel.endDate)?.toFixed(1)}h)
              </div>
            )}
            {(sel.eventSlug||sel.slug) && (
              <a href={`https://polymarket.com/event/${sel.eventSlug||sel.slug}`} target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", marginTop: "10px", fontSize: "10px", color: "#22d3ee", textDecoration: "none", letterSpacing: "1px" }}>VIEW ON POLYMARKET →</a>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
